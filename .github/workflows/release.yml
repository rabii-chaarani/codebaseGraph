name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_NO_CACHE_DIR: "1"

jobs:
  release-please:
    name: release please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag-name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Create release pull request or GitHub release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  production-gate:
    name: production release gate
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
    permissions:
      contents: read

    env:
      RELEASE_TAG: ${{ needs.release-please.outputs.tag-name }}
      CODEBASE_GRAPH_CONFIRM_TRUSTED_PUBLISHER: ${{ vars.CODEBASE_GRAPH_CONFIRM_TRUSTED_PUBLISHER }}
      CODEBASE_GRAPH_CONFIRM_PYPI_ENVIRONMENT: ${{ vars.CODEBASE_GRAPH_CONFIRM_PYPI_ENVIRONMENT }}
      CODEBASE_GRAPH_CONFIRM_HOSTED_CI_GREEN: ${{ vars.CODEBASE_GRAPH_CONFIRM_HOSTED_CI_GREEN }}
      CODEBASE_GRAPH_CONFIRM_PRIVATE_VULNERABILITY_REPORTING: ${{ vars.CODEBASE_GRAPH_CONFIRM_PRIVATE_VULNERABILITY_REPORTING }}
      CODEBASE_GRAPH_REQUIRE_CONDA: ${{ vars.CODEBASE_GRAPH_REQUIRE_CONDA }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Run production release gate
        shell: bash
        run: |
          args=(--production)
          if [[ "${CODEBASE_GRAPH_CONFIRM_TRUSTED_PUBLISHER}" == "true" ]]; then
            args+=(--confirm trusted-publisher)
          fi
          if [[ "${CODEBASE_GRAPH_CONFIRM_PYPI_ENVIRONMENT}" == "true" ]]; then
            args+=(--confirm pypi-environment)
          fi
          if [[ "${CODEBASE_GRAPH_CONFIRM_HOSTED_CI_GREEN}" == "true" ]]; then
            args+=(--confirm hosted-ci-green)
          fi
          if [[ "${CODEBASE_GRAPH_CONFIRM_PRIVATE_VULNERABILITY_REPORTING}" == "true" ]]; then
            args+=(--confirm private-vulnerability-reporting)
          fi
          if [[ "${CODEBASE_GRAPH_REQUIRE_CONDA}" == "true" ]]; then
            args+=(--require-conda)
          fi
          python scripts/check_release_gate.py "${args[@]}"

  build:
    name: build release distributions
    needs:
      - release-please
      - production-gate
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    outputs:
      package-version: ${{ steps.verify-version.outputs.package-version }}

    env:
      RELEASE_TAG: ${{ needs.release-please.outputs.tag-name }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Verify package version matches tag
        id: verify-version
        shell: bash
        run: |
          python - <<'PY'
          import email
          import glob
          import os
          import re
          import tarfile
          import zipfile

          tag = os.environ["RELEASE_TAG"]
          match = re.fullmatch(r"v(?P<version>\d+\.\d+\.\d+)", tag)
          if match is None:
              raise SystemExit(f"release tag must match vX.Y.Z, got {tag!r}")
          expected = match.group("version")

          versions = set()
          for artifact in glob.glob("dist/*"):
              if artifact.endswith(".whl"):
                  with zipfile.ZipFile(artifact) as wheel:
                      metadata_name = next(name for name in wheel.namelist() if name.endswith(".dist-info/METADATA"))
                      metadata = email.message_from_bytes(wheel.read(metadata_name))
              elif artifact.endswith(".tar.gz"):
                  with tarfile.open(artifact, "r:gz") as sdist:
                      metadata_member = next(member for member in sdist.getmembers() if member.name.endswith("/PKG-INFO"))
                      metadata = email.message_from_binary_file(sdist.extractfile(metadata_member))
              else:
                  raise SystemExit(f"unexpected distribution artifact: {artifact}")
              versions.add(metadata["Version"])

          if versions != {expected}:
              raise SystemExit(f"built package versions {sorted(versions)} do not match release tag {tag}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"package-version={expected}\n")
          PY

      - name: Smoke-test built wheel
        shell: bash
        run: |
          python -m venv /tmp/codebase-graph-wheel
          /tmp/codebase-graph-wheel/bin/python -m pip install --upgrade pip
          /tmp/codebase-graph-wheel/bin/python -m pip install dist/*.whl
          /tmp/codebase-graph-wheel/bin/python -m pip install cyclonedx-bom pip-audit
          /tmp/codebase-graph-wheel/bin/codebase-graph --help
          /tmp/codebase-graph-wheel/bin/codebase-graph-mcp --help
          /tmp/codebase-graph-wheel/bin/python scripts/smoke_built_wheel.py /tmp/codebase-graph-wheel/bin/codebase-graph
          /tmp/codebase-graph-wheel/bin/python -m pip check
          /tmp/codebase-graph-wheel/bin/python -m pip_audit --strict . --progress-spinner off --cache-dir /tmp/pip-audit-cache
          /tmp/codebase-graph-wheel/bin/cyclonedx-py environment /tmp/codebase-graph-wheel/bin/python \
            --pyproject pyproject.toml \
            --mc-type library \
            --output-reproducible \
            --of JSON \
            -o codebase-graph-${{ steps.verify-version.outputs.package-version }}-sbom.cdx.json

      - name: Smoke-test source distribution
        shell: bash
        run: |
          python -m venv /tmp/codebase-graph-sdist
          /tmp/codebase-graph-sdist/bin/python -m pip install --upgrade pip
          /tmp/codebase-graph-sdist/bin/python -m pip install dist/*.tar.gz
          /tmp/codebase-graph-sdist/bin/codebase-graph --help
          /tmp/codebase-graph-sdist/bin/codebase-graph-mcp --help
          /tmp/codebase-graph-sdist/bin/python scripts/smoke_built_wheel.py /tmp/codebase-graph-sdist/bin/codebase-graph

      - name: Upload distributions to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" dist/* codebase-graph-${{ steps.verify-version.outputs.package-version }}-sbom.cdx.json --clobber

  publish-pypi:
    name: publish to PyPI
    needs:
      - release-please
      - build
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/cbasegraph
    permissions:
      contents: read
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag-name }}

    steps:
      - name: Download distributions from GitHub release
        shell: bash
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" --dir dist --pattern "*.whl" --pattern "*.tar.gz"
          python - <<'PY'
          from pathlib import Path

          artifacts = sorted(path.name for path in Path("dist").iterdir())
          if not any(name.endswith(".whl") for name in artifacts):
              raise SystemExit(f"release {artifacts=} does not include a wheel")
          if not any(name.endswith(".tar.gz") for name in artifacts):
              raise SystemExit(f"release {artifacts=} does not include a source distribution")
          PY

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
