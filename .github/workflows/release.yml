name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish-existing-tag:
        description: Re-publish an existing GitHub release tag's native artifacts.
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  PIP_NO_CACHE_DIR: "1"
  MACOSX_DEPLOYMENT_TARGET: "13.3"

jobs:
  release-please:
    name: release please
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish-existing-tag == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag-name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Create release pull request or GitHub release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  production-gate:
    name: production release gate
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: release
    permissions:
      contents: read

    env:
      RELEASE_TAG: ${{ needs.release-please.outputs.tag-name }}
      CODEBASE_GRAPH_CONFIRM_RELEASE_ENVIRONMENT: ${{ vars.CODEBASE_GRAPH_CONFIRM_RELEASE_ENVIRONMENT }}
      CODEBASE_GRAPH_CONFIRM_HOSTED_CI_GREEN: ${{ vars.CODEBASE_GRAPH_CONFIRM_HOSTED_CI_GREEN }}
      CODEBASE_GRAPH_CONFIRM_PRIVATE_VULNERABILITY_REPORTING: ${{ vars.CODEBASE_GRAPH_CONFIRM_PRIVATE_VULNERABILITY_REPORTING }}
      CODEBASE_GRAPH_REQUIRE_CONDA: ${{ vars.CODEBASE_GRAPH_REQUIRE_CONDA }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Run production release gate
        shell: bash
        run: |
          args=(--production)
          if [[ "${CODEBASE_GRAPH_CONFIRM_RELEASE_ENVIRONMENT}" == "true" ]]; then
            args+=(--confirm release-environment)
          fi
          if [[ "${CODEBASE_GRAPH_CONFIRM_HOSTED_CI_GREEN}" == "true" ]]; then
            args+=(--confirm hosted-ci-green)
          fi
          if [[ "${CODEBASE_GRAPH_CONFIRM_PRIVATE_VULNERABILITY_REPORTING}" == "true" ]]; then
            args+=(--confirm private-vulnerability-reporting)
          fi
          if [[ "${CODEBASE_GRAPH_REQUIRE_CONDA}" == "true" ]]; then
            args+=(--require-conda)
          fi
          python scripts/check_release_gate.py "${args[@]}"

  build:
    name: build native release artifacts (${{ matrix.os }})
    needs:
      - release-please
      - production-gate
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    outputs:
      package-version: ${{ steps.verify-version.outputs.package-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: codebase-graph
            artifact-suffix: linux-x86_64
          - os: macos-latest
            binary: codebase-graph
            artifact-suffix: macos-universal
          - os: windows-2022
            binary: codebase-graph.exe
            artifact-suffix: windows-x86_64

    env:
      RELEASE_TAG: ${{ needs.release-please.outputs.tag-name }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Verify package version matches tag
        id: verify-version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          match = re.fullmatch(r"v(?P<version>\d+\.\d+\.\d+)", tag)
          if match is None:
              raise SystemExit(f"release tag must match vX.Y.Z, got {tag!r}")
          expected = match.group("version")

          with open("rust/crates/codebase_graph_native/Cargo.toml", "rb") as handle:
              cargo = tomllib.load(handle)
          actual = cargo["package"]["version"]
          if actual != expected:
              raise SystemExit(f"Rust crate version {actual} does not match release tag {tag}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"package-version={expected}\n")
          PY

      - name: Build Rust production binary
        shell: bash
        run: |
          cargo build --manifest-path rust/Cargo.toml --locked --release --bin codebase-graph
          mkdir -p dist/smoke
          cp "rust/target/release/${{ matrix.binary }}" "dist/smoke/${{ matrix.binary }}"
          chmod +x "dist/smoke/${{ matrix.binary }}"
          archive="codebase-graph-${{ steps.verify-version.outputs.package-version }}-${{ matrix.artifact-suffix }}.tar.gz"
          tar -C dist/smoke -czf "dist/${archive}" "${{ matrix.binary }}"
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"

      - name: Smoke-test Rust production binary
        shell: bash
        run: |
          "./dist/smoke/${{ matrix.binary }}" --help
          "./dist/smoke/${{ matrix.binary }}" graph-schema --json
          "./dist/smoke/${{ matrix.binary }}" setup --repo-root tests/fixtures/sample_project --mcp-client none --instructions-target skip --dry-run --json
          "./dist/smoke/${{ matrix.binary }}" mcp --help
          python scripts/smoke_native_artifact.py "./dist/smoke/${{ matrix.binary }}"

      - name: Upload native artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" dist/codebase-graph-*.tar.gz dist/codebase-graph-*.tar.gz.sha256 --clobber

  publish-existing-release-gate:
    name: existing release gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish-existing-tag != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: release
    permissions:
      contents: read

    env:
      RELEASE_TAG: ${{ inputs.publish-existing-tag }}
      CODEBASE_GRAPH_CONFIRM_RELEASE_ENVIRONMENT: ${{ vars.CODEBASE_GRAPH_CONFIRM_RELEASE_ENVIRONMENT }}
      CODEBASE_GRAPH_CONFIRM_HOSTED_CI_GREEN: ${{ vars.CODEBASE_GRAPH_CONFIRM_HOSTED_CI_GREEN }}
      CODEBASE_GRAPH_CONFIRM_PRIVATE_VULNERABILITY_REPORTING: ${{ vars.CODEBASE_GRAPH_CONFIRM_PRIVATE_VULNERABILITY_REPORTING }}
      CODEBASE_GRAPH_REQUIRE_CONDA: ${{ vars.CODEBASE_GRAPH_REQUIRE_CONDA }}

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re

          tag = os.environ["RELEASE_TAG"]
          if re.fullmatch(r"v\d+\.\d+\.\d+", tag) is None:
              raise SystemExit(f"release tag must match vX.Y.Z, got {tag!r}")
          PY

      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Run production release gate
        shell: bash
        run: |
          args=(--production)
          if [[ "${CODEBASE_GRAPH_CONFIRM_RELEASE_ENVIRONMENT}" == "true" ]]; then
            args+=(--confirm release-environment)
          fi
          if [[ "${CODEBASE_GRAPH_CONFIRM_HOSTED_CI_GREEN}" == "true" ]]; then
            args+=(--confirm hosted-ci-green)
          fi
          if [[ "${CODEBASE_GRAPH_CONFIRM_PRIVATE_VULNERABILITY_REPORTING}" == "true" ]]; then
            args+=(--confirm private-vulnerability-reporting)
          fi
          if [[ "${CODEBASE_GRAPH_REQUIRE_CONDA}" == "true" ]]; then
            args+=(--require-conda)
          fi
          python scripts/check_release_gate.py "${args[@]}"

  verify-existing-native-artifacts:
    name: verify existing native artifacts
    needs: publish-existing-release-gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish-existing-tag != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.publish-existing-tag }}

    steps:
      - name: Download native artifacts from GitHub release
        shell: bash
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir dist --pattern "codebase-graph-*.tar.gz" --pattern "codebase-graph-*.tar.gz.sha256"
          python - <<'PY'
          from pathlib import Path

          artifacts = sorted(path.name for path in Path("dist").iterdir())
          required_suffixes = ("linux-x86_64", "macos-universal", "windows-x86_64")
          for suffix in required_suffixes:
              archive = [name for name in artifacts if name.startswith("codebase-graph-") and name.endswith(f"{suffix}.tar.gz")]
              if not archive:
                  raise SystemExit(f"release {artifacts=} does not include a native {suffix} codebase-graph archive")
              checksum = f"{archive[0]}.sha256"
              if checksum not in artifacts:
                  raise SystemExit(f"release {artifacts=} does not include checksum {checksum}")
          PY
