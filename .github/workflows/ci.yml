name: CI

on:
  pull_request:
    branches:
      - main
      - "codex/**"
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

env:
  PIP_NO_CACHE_DIR: "1"
  MACOSX_DEPLOYMENT_TARGET: "13.3"

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2022
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build Rust CLI for compatibility tests
        run: cargo build --manifest-path rust/Cargo.toml --locked --bin codebase-graph

      - name: Run tests
        run: python -m pytest -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run ruff
        run: ruff check .

  rust-native:
    name: rust native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Run Rust tests
        run: cargo test --manifest-path rust/Cargo.toml --locked

      - name: Run Rust clippy
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --all-features --locked -- -D warnings

  supply-chain:
    name: supply chain
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dev harness and supply-chain tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install cyclonedx-bom pip-audit

      - name: Check installed dependency consistency
        run: python -m pip check

      - name: Run vulnerability advisory scan
        run: python -m pip_audit --strict -r requirements-dev.txt --progress-spinner off --cache-dir .pip-audit-cache

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py environment "$(which python)" \
            --mc-type library \
            --output-reproducible \
            --of JSON \
            -o codebase-graph-sbom.cdx.json

  package:
    name: native package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: codebase-graph
            archive: codebase-graph-linux-x86_64.tar.gz
          - os: macos-latest
            binary: codebase-graph
            archive: codebase-graph-macos-universal.tar.gz
          - os: windows-2022
            binary: codebase-graph.exe
            archive: codebase-graph-windows-x86_64.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Build Rust production binary
        shell: bash
        run: |
          cargo build --manifest-path rust/Cargo.toml --locked --release --bin codebase-graph
          mkdir -p dist/smoke
          cp "rust/target/release/${{ matrix.binary }}" "dist/smoke/${{ matrix.binary }}"
          chmod +x "dist/smoke/${{ matrix.binary }}"
          tar -C dist/smoke -czf "dist/${{ matrix.archive }}" "${{ matrix.binary }}"

      - name: Smoke-test Rust production binary
        shell: bash
        run: |
          "./dist/smoke/${{ matrix.binary }}" --help
          "./dist/smoke/${{ matrix.binary }}" graph-schema --json
          "./dist/smoke/${{ matrix.binary }}" setup --repo-root tests/fixtures/sample_project --mcp-client none --instructions-target skip --dry-run --json
          "./dist/smoke/${{ matrix.binary }}" mcp --help
          python scripts/smoke_native_artifact.py "./dist/smoke/${{ matrix.binary }}"
