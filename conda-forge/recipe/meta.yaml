{% set name = "codebase-graph" %}
{% set version = "PUT_RELEASE_VERSION_HERE" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/rabii-chaarani/codebaseGraph/archive/refs/tags/v{{ version }}.tar.gz
  sha256: PUT_RELEASE_ARCHIVE_SHA256_HERE

build:
  number: 0
  script:
    - cargo build --manifest-path rust/Cargo.toml --locked --release --bin codebase-graph
    - mkdir -p "${PREFIX}/bin"
    - cp rust/target/release/codebase-graph "${PREFIX}/bin/codebase-graph"

requirements:
  host:
    - cargo-bundle-licenses
    - {{ compiler('rust') }}
  run:

test:
  commands:
    - codebase-graph --help
    - codebase-graph mcp --help

about:
  home: https://github.com/rabii-chaarani/codebaseGraph
  summary: Native codebase knowledge graph CLI and MCP server.
  license: MIT

extra:
  recipe-maintainers:
    - rabii-chaarani
